version: '3.8'

services:

  app:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - .:/app
    depends_on:
      - db
      - redis
    env_file:
      - .env
    environment:
      - IS_CELERY=false

  celery:
    build: .
    command: celery -A src.scraper.tasks:celery worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - redis
      - db
    env_file:
      - .env
    environment:
      - IS_CELERY=true

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  db:
    image: postgres:latest
    env_file:
      - .env
    ports:
      - "5432:5432"
